<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>To-Do QA - Nueva Tarea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Nueva Tarea</h1>

  <form th:action="@{/ui/tasks}" th:object="${task}" method="post" id="task-form">

    <div class="mb-3">
      <label for="titulo" class="form-label">Título</label>
      <input type="text" th:field="*{titulo}" class="form-control" id="titulo">
    </div>

    <div class="mb-3">
      <label for="descripcion" class="form-label">Descripción</label>
      <textarea th:field="*{descripcion}" class="form-control" id="descripcion"></textarea>
    </div>

    <div class="mb-3">
      <label for="estado" class="form-label">Estado</label>
      <select th:field="*{estado}" class="form-select" id="estado">
        <option value="TODO">TODO</option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="prioridad" class="form-label">Prioridad</label>
      <select th:field="*{prioridad}" class="form-select" id="prioridad">
        <option value="BAJA">BAJA</option>
        <option value="MEDIA">MEDIA</option>
        <option value="ALTA">ALTA</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="fechaLimite" class="form-label">Fecha Límite</label>
      <input type="date" th:field="*{fechaLimite}" class="form-control" id="fechaLimite">
    </div>

    <button type="submit" class="btn btn-success" id="task-submit-btn">Guardar</button>
    <a href="/ui/tasks" class="btn btn-secondary" id="cancel-btn">Cancelar</a>
  </form>
</div>
</body>
</html>
